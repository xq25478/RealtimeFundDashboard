<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>实时基金看板</title>
<link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}" />
</head>
<body>
<header class="topbar">
  <div class="brand">实时基金看板 <span class="muted" id="updatedAt">-</span></div>
  <div class="topbar-right">
    <span class="indicator" id="liveDot"></span>
    <button id="refreshBtn">立即刷新基金</button>
    <button id="adviceBtn">生成完整投资指南</button>
  </div>
</header>

<main class="grid">
  <section class="card span-2" id="cardMarket">
    <h2>大盘 · 板块</h2>
    <div class="market-grid">
      <div class="indices" id="indices"></div>
      <div class="market-meta" id="marketMeta"></div>
    </div>
    <h3>主流入板块</h3>
    <table class="data-table" id="sectorTable">
      <thead><tr><th>板块</th><th>涨跌</th><th>主力净流入</th></tr></thead>
      <tbody></tbody>
    </table>
  </section>

  <section class="card span-2" id="cardFunds">
    <h2>自选基金 · 量化决策</h2>
    <table class="data-table" id="fundsTable">
      <thead>
        <tr>
          <th>代码</th><th>名称</th><th>主题</th>
          <th>净值</th><th>盘中估算</th>
          <th>评分</th><th>动作</th><th>信心</th><th>主因</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <section class="card" id="cardSentiment">
    <h2>消息面 · 政策面</h2>
    <div class="kv" id="sentBox"></div>
  </section>

  <section class="card" id="cardNews">
    <h2>财经新闻 · 7 日</h2>
    <ul class="news" id="newsList"></ul>
  </section>

  <section class="card span-2 chat-card" id="cardChat">
    <h2>咨询 AI · Claude</h2>
    <div class="chat" id="chatBox"></div>
    <form id="chatForm" autocomplete="off">
      <input id="chatInput" placeholder="例: 017811 涨了10%为什么还建议加仓？" />
      <button type="submit" id="chatSend">发送</button>
      <button type="button" id="chatClear" title="清空对话">清空</button>
    </form>
  </section>
</main>

<dialog id="adviceModal">
  <header>
    <strong>完整投资指南</strong>
    <button id="adviceClose">×</button>
  </header>
  <div id="adviceText" class="markdown">尚未生成。点击右上角"生成完整投资指南"。</div>
</dialog>

<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
